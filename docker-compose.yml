version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brainteasers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      # Use the internal docker network name "db" to connect to postgres
      DATABASE_URL: postgresql://postgres:password@db:5432/brainteasers
    depends_on:
      - db

volumes:
  postgres_data:
