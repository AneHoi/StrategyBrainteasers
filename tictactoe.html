<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="tictactoe.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="nav-bar">
        <a href="mastermind.html" class="nav-link">← Mastermind</a>
        <h1>TIC TAC TOE</h1>
        <a href="battleship.html" class="nav-link">Battleship →</a>
        <a href="history.html" class="nav-link">History</a>
    </div>

    <div class="game-container">
        <div class="status-panel">
            <h2 id="turn-indicator">Player X's Turn</h2>
            <div class="player-scores">
                <div class="score-card player-x active">
                    <h3>Player X</h3>
                    <div id="score-x">0</div>
                </div>
                <div class="score-card player-o">
                    <h3>Player O</h3>
                    <div id="score-o">0</div>
                </div>
            </div>
        </div>

        <div class="board" id="board">
            <!-- 9 cells generated by JS -->
        </div>

        <div class="controls">
            <button id="restart-btn" class="action-btn cta-btn">Restart Game</button>
        </div>
    </div>
    <script src="tictactoe.js"></script>
</body>
</html>
